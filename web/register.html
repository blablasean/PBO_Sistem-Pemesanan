<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buat Akun Baru</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="page-wrapper">
        <article class="page-card form-card" role="main" aria-labelledby="register-title">
            <header>
                <h1 id="register-title" class="page-title">Buat Akun Baru</h1>
                <p class="lead">Isi data akun untuk mulai menggunakan sistem peminjaman barang.</p>
            </header>
            <form id="register-form" class="page-grid">
                <div class="form-group">
                    <label for="name">Nama Lengkap</label>
                    <input id="name" name="name" type="text" class="input" autocomplete="name" placeholder="Nama lengkap" required />
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input id="register-email" name="email" type="email" class="input" autocomplete="username email" placeholder="email@example.com" required />
                </div>
                <div class="form-group">
                    <label for="register-password">Kata Sandi</label>
                    <input id="register-password" name="password" type="password" class="input" autocomplete="new-password" placeholder="••••••••" required />
                </div>
                <div class="form-group">
                    <label for="confirm-password">Ulangi Kata Sandi</label>
                    <input id="confirm-password" name="confirmPassword" type="password" class="input" autocomplete="new-password" placeholder="••••••••" required />
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Daftar Akun</button>
                </div>
                <p class="small">Sudah punya akun? <a href="login.html" class="link-button">Masuk</a></p>
            </form>
        </article>
    </main>

    <script>
        document.getElementById('register-form').addEventListener('submit', async function (event) {
            event.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            if (password !== confirmPassword) {
                alert('Password harus sama.');
                return;
            }
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    alert('Pendaftaran berhasil. Silakan login.');
                    window.location.href = 'login.html';
                } else {
                    alert(result.message || 'Gagal mendaftar.');
                }
            } catch (error) {
                console.error(error);
                alert('Terjadi kesalahan saat mendaftar. Coba lagi.');
            }
        });
    </script>
</body>
</html>
