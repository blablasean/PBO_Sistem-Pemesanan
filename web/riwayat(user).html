<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Riwayat Pemesanan</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="page-wrapper">
        <article class="page-card form-card" role="main" aria-labelledby="history-title">
            <header>
                <div class="header-info">
                    <h1 id="history-title" class="page-title">Riwayat Pemesanan</h1>
                    <p class="lead">Lihat riwayat peminjaman atau pemesanan barang Anda.</p>
                </div>
                <button type="button" class="btn btn-danger" id="logout-button" style="margin-top: 8px;">Logout</button>
            </header>
            <div class="controls" style="margin-bottom: 24px;">
                <input type="search" id="q" class="input" placeholder="Cari..." />
                <select id="filter-status" class="select" style="width: auto;">
                    <option value="all">Semua Status</option>
                    <option value="completed">Selesai</option>
                    <option value="pending">Dalam Proses</option>
                </select>
                <select id="filter-type" class="select" style="width: auto;">
                    <option value="all">Semua Kategori</option>
                    <option value="kamera">Kamera</option>
                    <option value="motor">Motor</option>
                </select>
            </div>
            <div class="items" id="list">
                <div class="empty-state">Memuat riwayat...</div>
            </div>
        </article>
    </main>

    <script>
        const listEl = document.getElementById('list');
        const q = document.getElementById('q');
        const status = document.getElementById('filter-status');
        const type = document.getElementById('filter-type');

        async function loadHistory() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            try {
                const response = await fetch('/api/riwayat');
                if (!response.ok) throw new Error('Gagal memuat riwayat');
                const data = await response.json();
                const userHistory = data.filter(item => String(item.user_id) === String(currentUser.id));
                renderHistory(userHistory);
            } catch (error) {
                console.error(error);
                listEl.innerHTML = '<div class="empty-state">Gagal memuat riwayat. Muat ulang halaman.</div>';
            }
        }

        function renderHistory(records) {
            listEl.innerHTML = '';
            if (!records || records.length === 0) {
                listEl.innerHTML = '<div class="empty-state">Belum ada riwayat peminjaman.</div>';
                return;
            }
            records.forEach(rec => {
                const card = document.createElement('div');
                card.className = 'item';
                const statusClass = rec.status && rec.status.toLowerCase().includes('selesai') ? 'status-completed' : 'status-pending';
                card.innerHTML = `
                    <img src="${rec.image_data || rec.image_url || 'https://via.placeholder.com/400x300?text=Barang'}" alt="${rec.barang_name || 'Barang'}" />
                    <h3>${rec.barang_name || 'Barang'}</h3>
                    <p>Dipinjam: ${rec.borrow_date || '-'}</p>
                    <p>Dikembalikan: ${rec.return_date || 'Belum kembali'}</p>
                    <p>Jml: ${rec.quantity || 1} · Ket: ${rec.note || '-'}</p>
                    <div class="item-actions">
                        <span class="status-pill ${statusClass}">${rec.status || 'Dalam Proses'}</span>
                    </div>
                `;
                listEl.appendChild(card);
            });
            applyFilter();
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }

        function applyFilter() {
            const term = q.value.toLowerCase();
            const st = status.value;
            const ty = type.value;
            Array.from(listEl.querySelectorAll('.item')).forEach(it => {
                const text = it.innerText.toLowerCase();
                let visible = true;
                if (term && !text.includes(term)) visible = false;
                if (st !== 'all') {
                    const isCompleted = it.querySelector('.status-pill').classList.contains('status-completed');
                    if (st === 'completed' && !isCompleted) visible = false;
                    if (st === 'pending' && isCompleted) visible = false;
                }
                if (ty !== 'all' && !text.includes(ty)) visible = false;
                it.style.display = visible ? '' : 'none';
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadHistory();
            q.addEventListener('input', applyFilter);
            status.addEventListener('change', applyFilter);
            type.addEventListener('change', applyFilter);
            document.getElementById('logout-button').addEventListener('click', logout);
        });
    </script>
</body>
</html>
