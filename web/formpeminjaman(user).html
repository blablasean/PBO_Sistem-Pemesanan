<!doctype html>
<html lang="id">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Form Peminjaman</title>
	<style>
		:root{--green:#3C8322;--card-radius:12px}
		html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:var(--green)}
		.wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
		.card{width:100%;max-width:1000px;background:#fff;border-radius:var(--card-radius);box-shadow:0 12px 30px rgba(0,0,0,.12);display:grid;grid-template-columns:1fr 420px;gap:24px;overflow:hidden}
		@media(max-width:900px){.card{grid-template-columns:1fr;padding:18px}}
		.form{padding:32px}
		.side{background:#f7f7f7;padding:24px;display:flex;flex-direction:column;gap:12px;align-items:center}
		h1{margin:0 0 8px;color:#0b3b03}
		label{display:block;margin:10px 0 6px;font-weight:600;color:#333}
		input,select,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px}
		textarea{min-height:100px}
		.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
		.actions{margin-top:16px;display:flex;gap:12px}
		button{padding:10px 14px;border-radius:8px;border:none;background:var(--green);color:#fff;font-weight:700;cursor:pointer}
		.secondary{background:#e6e6e6;color:#333}
		.logout-button{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border:none;border-radius:8px;background:#d9534f;color:#fff;font-weight:700;cursor:pointer;margin:12px 0}
		.illustration{width:100%;border-radius:10px;border:2px solid #949494}
		.note{font-size:13px;color:#555;text-align:center}
	</style>
</head>
<body>
	<div class="wrap">
		<div class="card" role="main" aria-labelledby="form-title">
			<form class="form" id="borrow-form">
				<div class="section">
					<h1 id="form-title">Ajukan Peminjaman</h1>
					<p class="note">Pilih barang yang tersedia dan kirim permintaan peminjaman.</p>
					<button type="button" class="logout-button" onclick="logout()">Logout</button>
				</div>

				<div class="info-box" id="user-info"></div>

				<div class="section">
					<label for="barang">Pilih Barang</label>
					<select id="barang" name="barang" required>
						<option value="">-- Pilih barang yang tersedia --</option>
					</select>
				</div>

				<div class="row">
					<div>
						<label for="tanggal_pinjam">Tanggal Pinjam</label>
						<input id="tanggal_pinjam" name="tanggal_pinjam" type="date" required />
					</div>
					<div>
						<label for="tanggal_kembali">Tanggal Kembali</label>
						<input id="tanggal_kembali" name="tanggal_kembali" type="date" required />
					</div>
				</div>

				<div class="section">
					<label for="jumlah">Jumlah</label>
					<input id="jumlah" name="jumlah" type="number" min="1" value="1" required />
				</div>

				<div class="section">
					<label for="alasan">Keterangan / Tujuan</label>
					<textarea id="alasan" name="alasan" placeholder="Contoh: Peminjaman untuk tugas instansi" required></textarea>
				</div>

				<div class="actions">
					<button type="submit">Kirim Permintaan</button>
					<button type="button" class="secondary" onclick="window.location.href='halamanpeminjaman(user).html'">Kembali</button>
				</div>
			</form>

			<!--<aside class="side" aria-hidden="true">
				<img class="illustration" src="https://api.builder.io/api/v1/image/assets/TEMP/fa6187e7d32f2d9783fcfef4222bb3decc54d6de?width=1303" alt="Ilustrasi Form Peminjaman" />
				<div class="note">Periksa kembali data sebelum mengajukan. Hubungi admin jika butuh bantuan.</div>
			</aside>-->
		</div>
	</div>

	<script>
        async function loadBarangOptions() {
            const select = document.getElementById('barang');
            try {
                const response = await fetch('/api/barang');
                if (!response.ok) throw new Error('Gagal memuat daftar barang');
                const data = await response.json();
                select.innerHTML = '<option value="">-- Pilih barang yang tersedia --</option>';
                data.filter(item => item.status && item.status.toLowerCase() === 'tersedia')
                    .forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.id;
                        option.textContent = `${item.name} (${item.category})`;
                        select.appendChild(option);
                    });
            } catch (error) {
                console.error(error);
                select.innerHTML = '<option value="">Tidak dapat memuat barang</option>';
            }
        }

        function showCurrentUser(user) {
            const info = document.getElementById('user-info');
            info.innerHTML = `
                <p><strong>Peminjam:</strong> ${user.name}</p>
                <p><strong>Peran:</strong> ${user.role}</p>
                <p><strong>ID Akun:</strong> ${user.id}</p>
            `;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('selectedItemId');
            window.location.href = 'login.html';
        }

        async function handleSubmit(event) {
            event.preventDefault();
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            if (!currentUser) {
                alert('Silakan login terlebih dahulu.');
                window.location.href = 'login.html';
                return;
            }
            const form = event.currentTarget;
            const data = Object.fromEntries(new FormData(form).entries());
            const payload = {
                userId: currentUser.id,
                barang_id: data.barang,
                borrow_date: data.tanggal_pinjam,
                return_date: data.tanggal_kembali,
                quantity: parseInt(data.jumlah, 10) || 1,
                note: data.alasan || '',
                status: 'Dipinjam'
            };
            try {
                const response = await fetch('/api/peminjaman', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    localStorage.removeItem('selectedItemId');
                    alert('Pengajuan peminjaman telah dikirim.');
                    window.location.href = 'halamanpeminjaman(user).html';
                } else {
                    alert(result.message || 'Gagal mengirim peminjaman.');
                }
            } catch (error) {
                console.error(error);
                alert('Terjadi kesalahan saat mengirim peminjaman.');
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            if (currentUser.role && currentUser.role.toLowerCase() === 'admin') {
                window.location.href = 'halamanpeminjaman(admin).html';
                return;
            }
            showCurrentUser(currentUser);
            await loadBarangOptions();
            const selectedItemId = localStorage.getItem('selectedItemId');
            if (selectedItemId) {
                document.getElementById('barang').value = selectedItemId;
            }
            document.getElementById('borrow-form').addEventListener('submit', handleSubmit);
        });
    </script>
</body>
</html>
