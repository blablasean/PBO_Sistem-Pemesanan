<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Form Peminjaman</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="page-wrapper">
        <article class="page-card two-column" role="main" aria-labelledby="form-title">
            <section class="page-grid">
                <header>
                    <h1 id="form-title" class="page-title">Ajukan Peminjaman</h1>
                    <p class="lead">Pilih barang yang tersedia dan kirim permintaan peminjaman.</p>
                </header>
                <button type="button" class="btn btn-danger" id="logout-button">Logout</button>
                <section id="user-info" class="info-card"></section>
                <form id="borrow-form" class="request-form">
                    <div class="form-group">
                        <label for="barang">Pilih Barang</label>
                        <select id="barang" name="barang" class="select" required>
                            <option value="">-- Pilih barang yang tersedia --</option>
                        </select>
                    </div>
                    <div class="section-row">
                        <div class="form-group">
                            <label for="tanggal_pinjam">Tanggal Pinjam</label>
                            <input id="tanggal_pinjam" name="tanggal_pinjam" class="input" type="date" required />
                        </div>
                        <div class="form-group">
                            <label for="tanggal_kembali">Tanggal Kembali</label>
                            <input id="tanggal_kembali" name="tanggal_kembali" class="input" type="date" required />
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="jumlah">Jumlah</label>
                        <input id="jumlah" name="jumlah" class="input" type="number" min="1" value="1" required />
                    </div>
                    <div class="form-group">
                        <label for="alasan">Keterangan / Tujuan</label>
                        <textarea id="alasan" name="alasan" class="textarea" placeholder="Contoh: Peminjaman untuk tugas instansi" required></textarea>
                    </div>
                    <div class="section-row">
                        <button type="submit" class="btn btn-primary">Kirim Permintaan</button>
                        <button type="button" class="btn btn-secondary" id="cancel-button">Kembali</button>
                    </div>
                </form>
            </section>
        </article>
    </main>

    <script>
        async function loadBarangOptions() {
            const select = document.getElementById('barang');
            try {
                const response = await fetch('/api/barang');
                if (!response.ok) throw new Error('Gagal memuat daftar barang');
                const data = await response.json();
                select.innerHTML = '<option value="">-- Pilih barang yang tersedia --</option>';
                data.filter(item => item.status && item.status.toLowerCase() === 'tersedia')
                    .forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.id;
                        option.textContent = `${item.name} (${item.category})`;
                        select.appendChild(option);
                    });
            } catch (error) {
                console.error(error);
                select.innerHTML = '<option value="">Tidak dapat memuat barang</option>';
            }
        }

        function showCurrentUser(user) {
            const info = document.getElementById('user-info');
            info.innerHTML = `
                <p><strong>Peminjam:</strong> ${user.name}</p>
                <p><strong>Peran:</strong> ${user.role}</p>
                <p><strong>ID Akun:</strong> ${user.id}</p>
            `;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('selectedItemId');
            window.location.href = 'login.html';
        }

        async function handleSubmit(event) {
            event.preventDefault();
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            if (!currentUser) {
                alert('Silakan login terlebih dahulu.');
                window.location.href = 'login.html';
                return;
            }
            const form = document.getElementById('borrow-form');
            const data = Object.fromEntries(new FormData(form).entries());
            
            if (new Date(data.tanggal_kembali) < new Date(data.tanggal_pinjam)) {
                alert('Tanggal kembali tidak boleh lebih awal dari tanggal pinjam.');
                return;
            }

            const payload = {
                userId: currentUser.id,
                barang_id: data.barang,
                borrow_date: data.tanggal_pinjam,
                return_date: data.tanggal_kembali,
                quantity: parseInt(data.jumlah, 10) || 1,
                note: data.alasan || '',
                status: 'Dipinjam'
            };
            try {
                const response = await fetch('/api/peminjaman', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    localStorage.removeItem('selectedItemId');
                    alert('Pengajuan peminjaman telah dikirim.');
                    window.location.href = 'halamanpeminjaman(user).html';
                } else {
                    alert(result.message || 'Gagal mengirim peminjaman.');
                }
            } catch (error) {
                console.error(error);
                alert('Terjadi kesalahan saat mengirim peminjaman.');
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            if (currentUser.role && currentUser.role.toLowerCase() === 'admin') {
                window.location.href = 'halamanpeminjaman(admin).html';
                return;
            }
            showCurrentUser(currentUser);
            await loadBarangOptions();

            const today = new Date().toISOString().split('T')[0];
            const tanggalPinjam = document.getElementById('tanggal_pinjam');
            const tanggalKembali = document.getElementById('tanggal_kembali');

            tanggalPinjam.min = today;
            tanggalKembali.min = today;

            tanggalPinjam.addEventListener('change', () => {
                tanggalKembali.min = tanggalPinjam.value;
                if (tanggalKembali.value && tanggalKembali.value < tanggalPinjam.value) {
                    tanggalKembali.value = tanggalPinjam.value;
                }
            });

            const selectedItemId = localStorage.getItem('selectedItemId');
            if (selectedItemId) {
                document.getElementById('barang').value = selectedItemId;
            }
            document.getElementById('borrow-form').addEventListener('submit', handleSubmit);
            document.getElementById('logout-button').addEventListener('click', logout);
            document.getElementById('cancel-button').addEventListener('click', () => { window.location.href = 'halamanpeminjaman(user).html'; });
        });
    </script>
</body>
</html>
