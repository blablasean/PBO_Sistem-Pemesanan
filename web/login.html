<!doctype html>
<html lang="id">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Halaman Login</title>
	<style>
		*{box-sizing:border-box}
		:root{--green:#3C8322;--card-radius:15px;--text:#1f391e;--muted:#5f6d5a}
		html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:var(--green);color:var(--text)}
		.container{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
		.card{width:100%;max-width:700px;background:#fff;border-radius:var(--card-radius);box-shadow:0 12px 28px rgba(0,0,0,.14);overflow:hidden}
		@media(max-width:640px){.card{margin:16px}}
		.left{padding:48px;display:flex;flex-direction:column;gap:18px}
		h1{margin:0;font-size:32px;color:#0b3b03}
		p.lead{margin:0;color:var(--muted);line-height:1.6}
		form{width:100%}
		.form-group{margin-bottom:18px}
		label{display:block;margin-bottom:8px;font-weight:600;color:#333}
		input[type="email"],input[type="password"]{width:100%;padding:14px 16px;border:1px solid #dcdcdc;border-radius:12px;font-size:15px;outline:none;transition:border .2s ease}
		input[type="email"]:focus,input[type="password"]:focus{border-color:var(--green)}
		button{width:100%;padding:14px 16px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s ease}
		button:hover{background:#2f6a1b}
		.small{font-size:13px;color:#666;margin-top:8px;text-align:center}
		a{color:var(--green);text-decoration:none}
		a:hover{text-decoration:underline}
	</style>
</head>
<body>
	<div class="container">
		<div class="card" role="main" aria-labelledby="login-title">
			<div class="left">
			<h1 id="login-title">Selamat Datang</h1>
			<p class="lead">Silakan masuk dengan akun yang sudah terdaftar.</p>
			<form id="login-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" autocomplete="email username" placeholder="email@example.com" required />
                    </div>
                    <div class="form-group">
                        <label for="password">Kata sandi</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
                    </div>
                    <div class="form-group">
                        <button type="submit">Masuk</button>
                    </div>
                    <div class="small">Belum punya akun? <a href="register.html">Buat akun</a></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    localStorage.setItem('currentUser', JSON.stringify({id: data.userId, role: data.role, name: data.name}));
                    if (data.role && data.role.toLowerCase() === 'admin') {
                        window.location.href = 'halamanpeminjaman(admin).html';
                    } else {
                        window.location.href = 'halamanpeminjaman(user).html';
                    }
                } else {
                    alert(data.message || 'Login gagal. Periksa email dan kata sandi.');
                }
            } catch (error) {
                console.error(error);
                alert('Terjadi kesalahan saat login. Coba lagi.');
            }
        });
    </script>
</body>
</html>
