<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Halaman Login</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="page-wrapper">
        <article class="page-card form-card" role="main" aria-labelledby="login-title">
            <header>
                <h1 id="login-title" class="page-title">Selamat Datang</h1>
                <p class="lead">Silakan masuk dengan akun yang sudah terdaftar untuk mengelola peminjaman barang.</p>
            </header>
            <form id="login-form" class="page-grid">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" class="input" autocomplete="email username" placeholder="email@example.com" required />
                </div>
                <div class="form-group">
                    <label for="password">Kata Sandi</label>
                    <input id="password" name="password" type="password" class="input" autocomplete="current-password" placeholder="••••••••" required />
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Masuk</button>
                </div>
                <p class="small">Belum punya akun? <a href="register.html" class="link-button">Buat akun</a></p>
            </form>
        </article>
    </main>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function (event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    localStorage.setItem('currentUser', JSON.stringify({ id: result.userId, role: result.role, name: result.name }));
                    window.location.href = result.role && result.role.toLowerCase() === 'admin'
                        ? 'halamanpeminjaman(admin).html'
                        : 'halamanpeminjaman(user).html';
                } else {
                    alert(result.message || 'Login gagal. Periksa email dan kata sandi.');
                }
            } catch (error) {
                console.error(error);
                alert('Terjadi kesalahan saat login. Coba lagi.');
            }
        });
    </script>
</body>
</html>
