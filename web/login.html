<!doctype html>
<html lang="id">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Halaman Login</title>
	<style>
		:root{--green:#3C8322;--card-radius:15px}
		html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:var(--green)}
		.container{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
		.card{width:100%;max-width:1100px;background:#fff;border-radius:var(--card-radius);box-shadow:0 8px 24px rgba(0,0,0,.15);display:flex;overflow:hidden}
		@media(max-width:900px){.card{flex-direction:column}}
		.left{flex:1;padding:48px;display:flex;flex-direction:column;justify-content:center}
		.right{flex:1;background:#f5f5f5;display:flex;align-items:center;justify-content:center;padding:24px}
		h1{margin:0 0 8px;font-size:28px;color:#0b3b03}
		p.lead{margin:0 0 24px;color:#355d2a}
		.form-group{margin-bottom:16px}
		label{display:block;margin-bottom:6px;font-weight:600;color:#333}
		input[type="email"],input[type="password"]{width:100%;padding:12px;border:1px solid #dcdcdc;border-radius:8px;font-size:15px}
		button{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer}
		.small{font-size:13px;color:#666;margin-top:10px;text-align:center}
		.img-placeholder{width:90%;max-width:520px;border-radius:12px;border:2px solid #949494}
	</style>
</head>
<body>
	<div class="container">
		<div class="card" role="main" aria-labelledby="login-title">
			<div class="left">
                <center>
				<h1 id="login-title">Selamat Datang</h1>
				<p class="lead">Silahkan login ke akun untuk melanjutkan</p>
				</center>
<form id="login-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email" type="email" placeholder="email@gmail.com" required />
                    </div>
                    <div class="form-group">
                        <label for="password">Kata sandi</label>
                        <input id="password" type="password" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required />
                    </div>
                    <div class="form-group">
                        <button type="submit">Masuk</button>
                    </div>
                    <div class="small">Belum punya akun? <a href="register.html">Buat akun</a></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    localStorage.setItem('currentUser', JSON.stringify({id: data.userId, role: data.role, name: data.name}));
                    if (data.role && data.role.toLowerCase() === 'admin') {
                        window.location.href = 'halamanpeminjaman(admin).html';
                    } else {
                        window.location.href = 'halamanpeminjaman(user).html';
                    }
                } else {
                    alert(data.message || 'Login gagal. Periksa email dan kata sandi.');
                }
            } catch (error) {
                console.error(error);
                alert('Terjadi kesalahan saat login. Coba lagi.');
            }
        });
    </script>
</body>
</html>
