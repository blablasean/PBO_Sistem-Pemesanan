<!doctype html>
<html lang="id">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Peminjaman Barang</title>
	<link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="page-wrapper">
        <article class="page-card" role="main" aria-labelledby="page-title">
            <header>
                <div class="header-info">
                    <h1 id="page-title" class="page-title">Peminjaman Barang</h1>
                    <p class="lead">Pilih barang yang ingin dipinjam dan ajukan permintaan secara cepat.</p>
                </div>
                <button type="button" id="logout-button" class="btn btn-danger" style="margin-top: 8px;">Logout</button>
            </header>
            <div class="page-grid">
                <aside class="panel">
                    <h2 class="section-title">Filter Barang</h2>
                    <div class="form-group">
                        <label for="filter-category">Filter Kategori</label>
                        <select id="filter-category" class="select" aria-label="Filter kategori">
                            <option value="all">Semua Kategori</option>
                            <option value="Kamera">Kamera</option>
                            <option value="Motor">Motor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="filter-status">Status</label>
                        <select id="filter-status" class="select" aria-label="Filter status">
                            <option value="all">Semua</option>
                            <option value="Tersedia">Tersedia</option>
                            <option value="Dipinjam">Dipinjam</option>
                        </select>
                    </div>
                </aside>
                <section class="panel">
                <div class="controls">
                    <input id="search-items" class="input" type="search" placeholder="Cari barang..." aria-label="Cari barang" />
                    <select id="sort-items" class="select" aria-label="Urutkan">
                        <option value="latest">Urutkan: Terbaru</option>
                        <option value="available">Hanya Tersedia</option>
                        <option value="borrowed">Hanya Dipinjam</option>
                    </select>
                    <button type="button" id="show-history-button" class="btn btn-primary">Lihat Riwayat</button>
                </div>
                <div class="items" id="items"></div>

                    <script>
                        let items = [];
                        const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
                        const itemList = document.getElementById('items');
                        const searchInput = document.getElementById('search-items');
                        const categoryFilter = document.getElementById('filter-category');
                        const statusFilter = document.getElementById('filter-status');
                        const sortSelect = document.getElementById('sort-items');

                        if (!currentUser) {
                            window.location.href = 'login.html';
                        } else if (currentUser.role && currentUser.role.toLowerCase() === 'admin') {
                            window.location.href = 'halamanpeminjaman(admin).html';
                        }

                        async function loadItems() {
                            try {
                                const response = await fetch('/api/barang');
                                if (!response.ok) throw new Error('Gagal memuat barang');
                                items = await response.json();
                                renderItems();
                            } catch (error) {
                                console.error(error);
                                itemList.innerHTML = '<div class="empty-state">Gagal memuat data barang.</div>';
                            }
                        }

                        function getFilteredItems() {
                            const filterCategory = categoryFilter.value;
                            const filterStatus = statusFilter.value;
                            const search = searchInput.value.trim().toLowerCase();
                            return items.filter(item => {
                                const matchesCategory = filterCategory === 'all' || item.category === filterCategory;
                                const matchesStatus = filterStatus === 'all' || item.status === filterStatus;
                                const matchesSearch = item.name.toLowerCase().includes(search) || item.category.toLowerCase().includes(search);
                                return matchesCategory && matchesStatus && matchesSearch;
                            });
                        }

                        function sortItems(filteredItems) {
                            const sortValue = sortSelect.value;
                            return filteredItems.slice().sort((a, b) => {
                                if (sortValue === 'available') {
                                    return (a.status === 'Tersedia' ? -1 : 1) - (b.status === 'Tersedia' ? -1 : 1);
                                }
                                if (sortValue === 'borrowed') {
                                    return (a.status === 'Dipinjam' ? -1 : 1) - (b.status === 'Dipinjam' ? -1 : 1);
                                }
                                return 0;
                            });
                        }

                        function renderItems() {
                            const visibleItems = sortItems(getFilteredItems());
                            itemList.innerHTML = '';
                            if (visibleItems.length === 0) {
                                itemList.innerHTML = '<div class="empty-state">Tidak ada barang sesuai filter.</div>';
                                return;
                            }
                            visibleItems.forEach(item => {
                                const card = document.createElement('div');
                                card.className = 'item';
                                const imageSrc = item.image_data || item.image_url || 'https://via.placeholder.com/400x300?text=Barang';
                                const specificInfo = item.category === 'Motor' 
                                    ? `CC: ${item.cc || '-'} &middot; Tipe: ${item.tipe || '-'}`
                                    : `MP: ${item.megapixel || '-'} &middot; Res: ${item.resolusi || '-'}`;

                                card.innerHTML = `
                                    <img src="${imageSrc}" alt="${item.name}" />
                                    <h3>${item.name}</h3>
                                    <p><strong>Merk:</strong> ${item.merk || '-'}</p>
                                    <p><strong>Harga:</strong> Rp${(item.price || 0).toLocaleString('id-ID')} / hari</p>
                                    <p>${specificInfo}</p>
                                    <div class="item-actions">
                                        <button type="button" class="btn btn-primary" style="width: 100%;" ${item.status !== 'Tersedia' ? 'disabled' : ''} data-id="${item.id}">
                                            ${item.status === 'Tersedia' ? 'Ajukan Peminjaman' : 'Tidak Tersedia'}
                                        </button>
                                    </div>
                                `;
                                const actionButton = card.querySelector('button');
                                actionButton.addEventListener('click', () => openBorrowForm(item.id));
                                itemList.appendChild(card);
                            });
                        }

                        function openBorrowForm(id) {
                            localStorage.setItem('selectedItemId', id);
                            window.location.href = 'formpeminjaman(user).html';
                        }

                        function logout() {
                            localStorage.removeItem('currentUser');
                            localStorage.removeItem('selectedItemId');
                            window.location.href = 'login.html';
                        }

                        document.getElementById('show-history-button').addEventListener('click', () => {
                            window.location.href = 'riwayat(user).html';
                        });
                        document.getElementById('logout-button').addEventListener('click', logout);
                        searchInput.addEventListener('input', renderItems);
                        categoryFilter.addEventListener('change', renderItems);
                        statusFilter.addEventListener('change', renderItems);
                        sortSelect.addEventListener('change', renderItems);
                        window.addEventListener('DOMContentLoaded', loadItems);
                    </script>
                </section>
            </div>
        </article>
    </main>
</body>
</html>
