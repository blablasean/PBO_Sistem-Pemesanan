<!doctype html>
<html lang="id">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Peminjaman Barang</title>
	<link rel="stylesheet" href="styles.css" />
</head>
<body>
	<div class="wrap">
		<div class="panel" role="main" aria-labelledby="page-title">
			<aside class="sidebar">
				<h1 id="page-title">Peminjaman Barang</h1>
				<p class="lead">Pilih barang yang ingin dipinjam dan ajukan permintaan secara cepat.</p>
				<div class="form-group">
					<label for="filter-category">Filter Kategori</label>
					<select id="filter-category" class="select" aria-label="Filter kategori">
						<option value="all">Semua Kategori</option>
						<option value="Elektronik">Elektronik</option>
						<option value="Furniture">Furniture</option>
						<option value="Alat Tulis">Alat Tulis</option>
					</select>
				</div>
				<div class="form-group">
					<label for="filter-status">Status</label>
					<select id="filter-status" class="select" aria-label="Filter status">
						<option value="all">Semua</option>
						<option value="Tersedia">Tersedia</option>
						<option value="Dipinjam">Dipinjam</option>
					</select>
				</div>
			</aside>
            <section class="content">
                <div class="controls">
                    <input id="search-items" class="input" type="search" placeholder="Cari barang..." aria-label="Cari barang" />
                    <select id="sort-items" class="select" aria-label="Urutkan">
                        <option value="latest">Urutkan: Terbaru</option>
                        <option value="available">Hanya Tersedia</option>
                        <option value="borrowed">Hanya Dipinjam</option>
                    </select>
                    <button type="button" id="show-history-button" class="btn btn-secondary">Lihat Riwayat</button>
                    <button type="button" id="logout-button" class="btn btn-danger">Logout</button>
                </div>
                <div class="items" id="items"></div>

                    <!-- History modal -->
                    <div id="history-modal" class="modal" aria-hidden="true">
                        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="history-modal-title">
                            <button id="close-history-button" class="modal-close" aria-label="Tutup">×</button>
                            <h2 id="history-modal-title">Riwayat Peminjaman</h2>
                            <div id="history-container"><div class="modal-loading">Memuat...</div></div>
                        </div>
                    </div>


                    <script>
                        let items = [];
                        const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
                        const itemList = document.getElementById('items');
                        const searchInput = document.getElementById('search-items');
                        const categoryFilter = document.getElementById('filter-category');
                        const statusFilter = document.getElementById('filter-status');
                        const sortSelect = document.getElementById('sort-items');
                        const historyModal = document.getElementById('history-modal');
                        const historyContainer = document.getElementById('history-container');

                        if (!currentUser) {
                            window.location.href = 'login.html';
                        } else if (currentUser.role && currentUser.role.toLowerCase() === 'admin') {
                            window.location.href = 'halamanpeminjaman(admin).html';
                        }

                        async function loadItems() {
                            try {
                                const response = await fetch('/api/barang');
                                if (!response.ok) throw new Error('Gagal memuat barang');
                                items = await response.json();
                                renderItems();
                            } catch (error) {
                                console.error(error);
                                itemList.innerHTML = '<div class="empty-state">Gagal memuat data barang.</div>';
                            }
                        }

                        function getFilteredItems() {
                            const filterCategory = categoryFilter.value;
                            const filterStatus = statusFilter.value;
                            const search = searchInput.value.trim().toLowerCase();
                            return items.filter(item => {
                                const matchesCategory = filterCategory === 'all' || item.category === filterCategory;
                                const matchesStatus = filterStatus === 'all' || item.status === filterStatus;
                                const matchesSearch = item.name.toLowerCase().includes(search) || item.category.toLowerCase().includes(search);
                                return matchesCategory && matchesStatus && matchesSearch;
                            });
                        }

                        function sortItems(filteredItems) {
                            const sortValue = sortSelect.value;
                            return filteredItems.slice().sort((a, b) => {
                                if (sortValue === 'available') {
                                    return (a.status === 'Tersedia' ? -1 : 1) - (b.status === 'Tersedia' ? -1 : 1);
                                }
                                if (sortValue === 'borrowed') {
                                    return (a.status === 'Dipinjam' ? -1 : 1) - (b.status === 'Dipinjam' ? -1 : 1);
                                }
                                return 0;
                            });
                        }

                        function renderItems() {
                            const visibleItems = sortItems(getFilteredItems());
                            itemList.innerHTML = '';
                            if (visibleItems.length === 0) {
                                itemList.innerHTML = '<div class="empty-state">Tidak ada barang sesuai filter.</div>';
                                return;
                            }
                            visibleItems.forEach(item => {
                                const card = document.createElement('div');
                                card.className = 'item';
                                const imageSrc = item.image_data || item.image_url || 'https://via.placeholder.com/400x300?text=Barang';
                                card.innerHTML = `
                                    <img src="${imageSrc}" alt="${item.name}" />
                                    <h3>${item.name}</h3>
                                    <p>Kategori: ${item.category}</p>
                                    <p>Status: ${item.status}</p>
                                    <button type="button" class="btn btn-primary" ${item.status !== 'Tersedia' ? 'disabled' : ''} data-id="${item.id}">
                                        ${item.status === 'Tersedia' ? 'Ajukan Peminjaman' : 'Tidak Tersedia'}
                                    </button>
                                `;
                                const actionButton = card.querySelector('button');
                                actionButton.addEventListener('click', () => openBorrowForm(item.id));
                                itemList.appendChild(card);
                            });
                        }

                        function openBorrowForm(id) {
                            localStorage.setItem('selectedItemId', id);
                            window.location.href = 'formpeminjaman(user).html';
                        }

                        async function showHistory() {
                            historyContainer.innerHTML = '<div class="empty-state">Memuat riwayat...</div>';
                            historyModal.classList.add('active');
                            try {
                                const response = await fetch('/api/riwayat', { cache: 'no-store' });
                                if (!response.ok) throw new Error('Gagal memuat riwayat');
                                const history = await response.json();
                                renderHistory(history.filter(rec => String(rec.user_id) === String(currentUser.id)));
                            } catch (error) {
                                console.error(error);
                                historyContainer.innerHTML = '<div class="empty-state">Gagal memuat riwayat. Coba lagi nanti.</div>';
                            }
                        }

                        function renderHistory(records) {
                            historyContainer.innerHTML = '';
                            if (!records.length) {
                                historyContainer.innerHTML = '<div class="empty-state">Belum ada riwayat peminjaman.</div>';
                                return;
                            }
                            const list = document.createElement('div');
                            list.className = 'items';
                            records.forEach(rec => {
                                const card = document.createElement('div');
                                card.className = 'item';
                                const imageSrc = rec.image_data || rec.image_url || 'https://via.placeholder.com/400x300?text=Barang';
                                const statusClass = rec.status && rec.status.toLowerCase().includes('selesai')
                                    ? 'status-completed' : 'status-pending';
                                card.innerHTML = `
                                    <img src="${imageSrc}" alt="${rec.barang_name || 'Barang'}" />
                                    <h3>${rec.barang_name || 'Barang'}</h3>
                                    <p>Dipinjam: ${rec.borrow_date || '-'} — Dikembalikan: ${rec.return_date || 'Belum kembali'}</p>
                                    <p>Jumlah: ${rec.quantity || 1} · Keterangan: ${rec.note || '-'}</p>
                                    <span class="status-pill ${statusClass}">${rec.status || 'Dalam Proses'}</span>
                                `;
                                list.appendChild(card);
                            });
                            historyContainer.appendChild(list);
                        }

                        function closeHistory() {
                            historyModal.classList.remove('active');
                        }

                        function logout() {
                            localStorage.removeItem('currentUser');
                            localStorage.removeItem('selectedItemId');
                            window.location.href = 'login.html';
                        }

                        document.addEventListener('click', event => {
                            if (event.target === historyModal) {
                                closeHistory();
                            }
                        });

                        document.getElementById('close-history-button').addEventListener('click', closeHistory);
                        document.getElementById('show-history-button').addEventListener('click', showHistory);
                        document.getElementById('logout-button').addEventListener('click', logout);
                        searchInput.addEventListener('input', renderItems);
                        categoryFilter.addEventListener('change', renderItems);
                        statusFilter.addEventListener('change', renderItems);
                        sortSelect.addEventListener('change', renderItems);
                        window.addEventListener('DOMContentLoaded', loadItems);
                    </script>
                </div>
            </div>

</body>
</html>
