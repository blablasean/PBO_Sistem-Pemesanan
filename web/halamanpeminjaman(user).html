<!doctype html>
<html lang="id">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Peminjaman Barang</title>
	<style>
		:root{--green:#3C8322;--card-radius:12px}
		html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:var(--green)}
		.wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
		.panel{width:100%;max-width:1200px;background:#fff;border-radius:var(--card-radius);box-shadow:0 12px 30px rgba(0,0,0,.15);display:flex;gap:24px;overflow:hidden}
		@media(max-width:920px){.panel{flex-direction:column}}
		.sidebar{flex:0 0 360px;padding:28px;background:#f7f7f7}
		.content{flex:1;padding:28px}
		h1{margin:0 0 6px;font-size:22px;color:#0b3b03}
		.controls{display:flex;gap:12px;flex-wrap:wrap;margin:16px 0}
		.search{flex:1;min-width:180px;padding:10px;border:1px solid #ddd;border-radius:8px}
		.select{padding:10px;border:1px solid #ddd;border-radius:8px;background:#fff}
		.items{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
		.item{background:#fff;border:1px solid #e6e6e6;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px}
		.item img{width:100%;height:140px;object-fit:cover;border-radius:8px}
		.item h3{margin:0;font-size:16px;color:#123}
		.item p{margin:0;color:#555;font-size:13px}
		.item button{margin-top:auto;padding:10px;border-radius:8px;border:none;background:var(--green);color:#fff;font-weight:700;cursor:pointer}
		.img-placeholder{width:100%;border-radius:12px;border:2px solid #949494}
	</style>
</head>
<body>
	<div class="wrap">
		<div class="panel" role="main" aria-labelledby="page-title">
			<aside class="sidebar">
				<h1 id="page-title">Peminjaman Barang</h1>
				<p style="color:#3a5d2d;margin-top:6px">Pilih barang yang ingin dipinjam.</p>
				<div style="margin-top:18px">
					<label style="font-weight:600;color:#333">Filter Kategori</label>
					<select class="select" aria-label="Filter kategori">
						<option>Semua Kategori</option>
						<option>Elektronik</option>
						<option>Furniture</option>
						<option>Alat Tulis</option>
					</select>
				</div>
				<div style="margin-top:18px">
					<label style="font-weight:600;color:#333">Status</label>
					<select class="select" aria-label="Filter status">
						<option>Semua</option>
						<option>Tersedia</option>
						<option>Dipinjam</option>
					</select>
				</div>
				<!--<div style="margin-top:22px">
					<img class="img-placeholder" src="https://api.builder.io/api/v1/image/assets/TEMP/96f73c6796eb28315c69d701053191074f15748c?width=1388" alt="Ilustrasi Peminjaman" />
				</div>-->
			</aside>
			<section class="content">
				<div class="controls">
					<input class="search" type="search" placeholder="Cari barang..." aria-label="Cari barang" />
					<select class="select" aria-label="Urutkan">
						<option>Urutkan: Terbaru</option>
						<option>Urutkan: Populer</option>
						<option>Urutkan: Tersedia</option>
					</select>
					<button type="button" class="btn-history" onclick="showHistory()">Lihat Riwayat</button>
				</div>
				<div class="items" id="items">
					<!-- Example items - replace with dynamic data as needed -->
					<div class="item">
						<img src="https://via.placeholder.com/400x300?text=Proyektor" alt="Proyektor" />
						<h3>Proyektor Panasonic</h3>
						<p>Status: Tersedia</p>
						<button type="button" onclick="alert('Meminjam Proyektor')">Pinjam</button>
					</div>
					<div class="item">
						<img src="https://via.placeholder.com/400x300?text=Laptop" alt="Laptop" />
						<h3>Laptop Dell</h3>
						<p>Status: Dipinjam</p>
						<button type="button" onclick="alert('Tidak tersedia')">Tidak Tersedia</button>
					</div>
					<div class="item">
						<img src="https://via.placeholder.com/400x300?text=Meja" alt="Meja" />
						<h3>Meja Lipat</h3>
						<p>Status: Tersedia</p>
						<button type="button" onclick="alert('Meminjam Meja')">Pinjam</button>
					</div>
				</div>

					<!-- History modal -->
					<div id="history-modal" class="modal" aria-hidden="true">
						<div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="history-modal-title">
							<button class="modal-close" aria-label="Tutup" onclick="closeHistory()">×</button>
							<h2 id="history-modal-title">Riwayat Peminjaman</h2>
							<div id="history-container"><div class="modal-loading">Memuat...</div></div>
						</div>
					</div>

					<style>
						/* Modal styles */
						.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.45);z-index:1200}
						.modal[data-open="true"]{display:flex}
						.modal-content{position:relative;background:#fff;border-radius:12px;padding:20px;max-width:1000px;width:95%;max-height:80vh;overflow:auto}
						.modal-close{position:absolute;right:12px;top:8px;background:none;border:0;font-size:24px;line-height:1;cursor:pointer}
						.modal-loading{padding:30px;text-align:center;color:#555}
						.modal-error{padding:20px;color:#b00020}
						.btn-history{padding:10px 12px;border-radius:8px;border:none;background:#fff;color:#0b3b03;border:1px solid #d0d0d0;cursor:pointer}
						.btn-history:hover{background:#f3f3f3}
					</style>

					<script>
						async function showHistory(){
							const modal = document.getElementById('history-modal');
							const container = document.getElementById('history-container');
							container.innerHTML = '<div class="modal-loading">Memuat...</div>';
							modal.setAttribute('data-open','true');
							// First try API endpoint (JSON). If it fails, fall back to loading riwayat(user).html
							try{
								let res;
								try{
									res = await fetch('/api/riwayat', {cache: 'no-store'});
								}catch(e){ res = null; }
								if(res && res.ok){
									const ct = (res.headers.get('content-type')||'');
									if(ct.includes('application/json')){
										const data = await res.json();
										renderHistoryFromJson(container, data);
										return;
									}
								}
								// fallback: load static page
								const fallback = await fetch('riwayat(user).html');
								if(!fallback.ok) throw new Error('HTTP '+fallback.status);
								const text = await fallback.text();
								const parser = new DOMParser();
								const doc = parser.parseFromString(text,'text/html');
								const list = doc.getElementById('list') || doc.body;
								container.innerHTML = '';
								container.appendChild(document.importNode(list, true));
							}catch(err){
								console.error(err);
								container.innerHTML = '<div class="modal-error">Gagal memuat riwayat. Buka halaman riwayat secara langsung.</div>';
							}
						}

						function renderHistoryFromJson(container, data){
							container.innerHTML = '';
							if(!Array.isArray(data) || data.length === 0){
								container.innerHTML = '<div class="modal-loading">Belum ada riwayat.</div>';
								return;
							}
							const list = document.createElement('div');
							list.style.display = 'flex';
							list.style.flexDirection = 'column';
							list.style.gap = '12px';
							data.forEach(rec => {
								const row = document.createElement('div');
								row.style.display = 'flex';
								row.style.gap = '12px';
								row.style.alignItems = 'center';
								const img = document.createElement('img');
								img.src = rec.image || ('https://via.placeholder.com/400x300?text=' + encodeURIComponent(rec.title || 'Item'));
								img.alt = rec.title || 'Item';
								img.style.width = '120px';
								img.style.height = '80px';
								img.style.objectFit = 'cover';
								img.style.borderRadius = '8px';
								img.style.flex = '0 0 120px';
								const meta = document.createElement('div');
								meta.style.flex = '1';
								const h = document.createElement('div');
								h.style.fontWeight = '700';
								h.textContent = rec.title || rec.name || 'Untitled';
								const p1 = document.createElement('div');
								p1.style.color = '#666';
								p1.style.fontSize = '13px';
								p1.textContent = (rec.borrowedAt ? 'Dipinjam: '+rec.borrowedAt : '') + (rec.returnedAt ? ' — Dikembalikan: '+rec.returnedAt : '');
								const p2 = document.createElement('div');
								p2.style.color = '#666';
								p2.style.fontSize = '13px';
								p2.textContent = 'Jumlah: '+(rec.quantity||1) + (rec.note ? ' · '+rec.note : '');
								meta.appendChild(h);
								meta.appendChild(p1);
								meta.appendChild(p2);
								const status = document.createElement('div');
								status.style.padding = '6px 10px';
								status.style.borderRadius = '8px';
								status.style.fontWeight = '700';
								if((rec.status||'').toLowerCase().includes('selesai') || (rec.status||'').toLowerCase().includes('completed')){
									status.style.background = '#e6f8e9'; status.style.color = '#0b3b03'; status.textContent = rec.status || 'Selesai';
								}else{
									status.style.background = '#fff4e6'; status.style.color = '#b76e00'; status.textContent = rec.status || 'Dalam Proses';
								}
								row.appendChild(img);
								row.appendChild(meta);
								row.appendChild(status);
								list.appendChild(row);
							});
							container.appendChild(list);
						}

						function closeHistory(){
							document.getElementById('history-modal').removeAttribute('data-open');
						}

						// close modal when clicking outside content
						document.addEventListener('click', function(e){
							const modal = document.getElementById('history-modal');
							if(modal.getAttribute('data-open') === 'true' && e.target === modal){ closeHistory(); }
						});
					</script>
			</section>
		</div>
	</div>

</body>
</html>
